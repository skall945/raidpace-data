name: Update logdata

on:
  schedule:
    - cron: '17 0 * * *'   # tre corse notturne (UTC): ognuna riprende dalla precedente
    - cron: '17 2 * * *'
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      zones:
        description: "ID zona WCL (spazio-separati, in ordine di priorita')"
        default: "46 44 42 38 50 35 33 31 53 54 57"

permissions:
  contents: write

concurrency:
  group: logdata
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Genera logdata.json + worlddata.json
        # anche se questo step fallisce/scade, il commit sotto salva il parziale
        continue-on-error: true
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
          DIFFS: "5"
          # FULL su TUTTI i raid ricercabili: pull+url della PRIMA KILL, incrementale,
          # con skip delle zone gia' complete -> ogni run avanza dove manca.
          FULL: "46 44 42 38 50 35 33 31 53 54 57"
          # esce pulito prima del limite del job -> il parziale viene committato
          MAX_MINUTES: "120"
        run: python gen.py ${{ github.event.inputs.zones || '46 44 42 38 50 35 33 31 53 54 57' }}
      - name: Commit con merge monotono (la copertura non cala mai)
        if: always()
        run: |
          # 1) valida i JSON generati: se non parsano, niente commit (mai file rotti)
          if ! python -c "import json; json.load(open('logdata.json',encoding='utf-8')); json.load(open('worlddata.json',encoding='utf-8'))"; then
            echo "JSON generati non validi: niente commit"; exit 0
          fi
          cp logdata.json /tmp/gen_ld.json
          cp worlddata.json /tmp/gen_wd.json
          git config user.name "raidpace-bot"
          git config user.email "actions@users.noreply.github.com"
          # 2) merge contro l'ULTIMO origin, con retry sulle race del push
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            python merge_ld.py /tmp/gen_ld.json   # unisce il generato dentro origin (union)
            cp /tmp/gen_wd.json worlddata.json
            git add logdata.json worlddata.json
            git commit -m "aggiorna dati ($(date -u +%FT%H:%M))" || { echo "nessuna modifica"; break; }
            if git push; then echo "push ok"; break; fi
            echo "push race, ritento ($i)"; sleep 5
          done
