name: Update logdata

on:
  schedule:
    - cron: '17 0 * * *'   # tre corse notturne (UTC): ognuna riprende dalla precedente
    - cron: '17 2 * * *'
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      zones:
        description: "ID zona WCL (spazio-separati)"
        default: "31 33 35 38 42 44 46 50 53 54 57"

permissions:
  contents: write

concurrency:
  group: logdata
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Genera logdata.json + worlddata.json
        # anche se questo step fallisce/scade, il commit sotto salva il parziale
        continue-on-error: true
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
          DIFFS: "5"
          # FULL = anche pull+url della PRIMA KILL (incrementale: solo gilde nuove)
          FULL: "46 50"
          # esce pulito prima del limite del job -> il parziale viene committato
          MAX_MINUTES: "120"
        run: python gen.py ${{ github.event.inputs.zones || '31 33 35 38 42 44 46 50 53 54 57' }}
      - name: Commit se cambiato (senza MAI conflitti nei dati)
        if: always()
        run: |
          # 1) VALIDA i JSON: se non parsano, non si committa nulla (mai file rotti online)
          if ! python -c "import json; json.load(open('logdata.json',encoding='utf-8')); json.load(open('worlddata.json',encoding='utf-8'))"; then
            echo "JSON non validi: niente commit"; exit 0
          fi
          # 2) niente pull/rebase sui dati (fonte dei conflitti-in-file): il run e'
          #    l'unico scrittore concorrente (concurrency group) -> reset + riscrivi
          cp logdata.json /tmp/ld.json && cp worlddata.json /tmp/wd.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/ld.json logdata.json && cp /tmp/wd.json worlddata.json
          git config user.name "raidpace-bot"
          git config user.email "actions@users.noreply.github.com"
          git add logdata.json worlddata.json
          git commit -m "aggiorna dati ($(date -u +%FT%H:%M))" || echo "nessuna modifica"
          git push
